name: .NET Docker CI/CD

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # STEP 1: CLEAN the server BEFORE copying files
      - name: Pre-deployment Cleanup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo rm -rf /home/ubuntu/app
            mkdir -p /home/ubuntu/app

      # STEP 2: COPY the source code to the now-empty folder
      - name: Copy source to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "./*"
          target: "/home/ubuntu/app"

      # STEP 3: BUILD and RUN inside the fresh folder
      - name: Docker Build & Run
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            
            # Install Docker only if missing
            if ! command -v docker &> /dev/null; then
              sudo apt-get update
              sudo apt-get install -y docker.io
              sudo usermod -aG docker ubuntu
            fi

            # Build the image and launch the container
            sudo docker build -t weather-app .
            sudo docker stop my-app-container || true
            sudo docker rm my-app-container || true
            sudo docker run -d --name my-app-container -p 5000:8080 weather-app