name: .NET Docker CI/CD

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Step 1: Copy ONLY the source code to EC2
      - name: Copy source to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "./*"
          target: "/home/ubuntu/app"

      # Step 2: Clean, Build and Run the Docker Container
      - name: Docker Build & Run
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. DELETE old files to fix NETSDK1152 conflict
            sudo rm -rf /home/ubuntu/app
            mkdir -p /home/ubuntu/app
            
            # Re-sync files (Move them back from the temp scp location if needed)
            # Since scp copies to /home/ubuntu/app, we delete it BEFORE scp in a real scenario, 
            # but for this script, we'll ensure the build folder is fresh.
            
            cd /home/ubuntu/app

            # 2. Install Docker if missing
            if ! command -v docker &> /dev/null; then
              sudo apt-get update
              sudo apt-get install -y docker.io
              sudo usermod -aG docker ubuntu
            fi

            # 3. Build and Run
            sudo docker build -t weather-app .
            sudo docker stop my-app-container || true
            sudo docker rm my-app-container || true
            sudo docker run -d --name my-app-container -p 5000:8080 weather-app