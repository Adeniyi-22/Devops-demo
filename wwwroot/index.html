<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud DevOps Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 2rem; border-radius: 10px; shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 50px; width: 80%; max-width: 800px; }
        h1 { color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background-color: #3498db; color: white; }
        .refresh-btn { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AWS Cloud Weather Dashboard</h1>
        <button class="refresh-btn" onclick="fetchWeather()">Update Data from API</button>
        <table id="weatherTable">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Temp (C)</th>
                    <th>Temp (F)</th>
                    <th>Summary</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        async function fetchWeather() {
            const response = await fetch('/weatherforecast');
            const data = await response.json();
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = ''; 

            data.forEach(item => {
                const row = `<tr>
                    <td>${item.date}</td>
                    <td>${item.temperatureC}°</td>
                    <td>${item.temperatureF}°</td>
                    <td>${item.summary}</td>
                </tr>`;
                tableBody.innerHTML += row;
            });
        }
        fetchWeather(); // Load immediately
    </script>
</body>
</html>
